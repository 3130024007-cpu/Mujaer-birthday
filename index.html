<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Sayang 🤎</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow-x:hidden;
    overflow-y:auto;

    padding:20px;

    background:linear-gradient(
        135deg,
        #ffffff,
        #fff7f2,
        #ecd7c4
    );

}

/* dekorasi jatuh */

.falling{

    position:fixed;
    top:-80px;

    z-index:1;

    pointer-events:none;

    animation:fall linear infinite;

}

@keyframes fall{

    from{

        transform:translateY(-100px) rotate(0deg);

    }

    to{

        transform:translateY(110vh) rotate(360deg);

    }

}

/* container */

.container{

    position:relative;

    z-index:5;

    width:100%;
    max-width:520px;

    text-align:center;

    background:rgba(255,255,255,.45);

    backdrop-filter:blur(12px);

    border-radius:28px;

    padding:30px 25px;

    box-shadow:0 10px 35px rgba(0,0,0,.08);

    animation:fade .5s;

}

@keyframes fade{

    from{

        opacity:0;
        transform:translateY(20px);

    }

    to{

        opacity:1;
        transform:translateY(0);

    }

}

h1{

    color:#7d5438;

    font-size:38px;

    margin-bottom:10px;

}

.small{

    color:#a37b63;

    font-style:italic;

    margin-bottom:8px;

}

.gif-box{

    margin-bottom:20px;

}

.gif-box img{

    width:220px;
    max-width:100%;

    border-radius:18px;

}

.text{

    margin-top:15px;

    color:#8a6045;

    font-size:20px;

    line-height:1.7;

}

button{

    margin-top:30px;

    padding:14px 35px;

    border:none;

    border-radius:40px;

    background:#f4a5b8;

    color:white;

    cursor:pointer;

    font-size:18px;

    font-weight:600;

    transition:.3s;

}

button:hover{

    transform:scale(1.08);

}

/* moment */

.photo-slider{

    display:flex;

    gap:15px;

    margin-top:20px;

    overflow-x:auto;

    scroll-snap-type:x mandatory;

    padding-bottom:10px;

}

.photo-slider::-webkit-scrollbar{

    height:6px;

}

.photo-slider::-webkit-scrollbar-thumb{

    background:#d6b39d;

    border-radius:20px;

}

.photo-slider img{

    flex:0 0 auto;

    width:250px;

    height:330px;

    object-fit:cover;

    border-radius:18px;

    scroll-snap-align:center;

}

.big-text{

    margin-top:20px;

    font-size:21px;

    font-weight:600;

    color:#7d5438;

}

.normal-text{

    margin-top:15px;

    color:#91684d;

    font-size:17px;

}

/* surat */

.letter-box{

    margin-top:20px;

    width:100%;

    max-height:420px;

    overflow-y:auto;

    padding:20px;

    text-align:left;

    background:rgba(255,255,255,.55);

    border-left:4px solid #f3adc0;

    border-right:4px solid #f3adc0;

    border-radius:18px;

    color:#795548;

    line-height:1.9;

}

/* HP */

@media(max-width:600px){

    .container{

        padding:22px 18px;

    }

    h1{

        font-size:28px;

    }

    .gif-box img{

        width:170px;

    }

    .text{

        font-size:17px;

    }

    button{

        width:100%;

        font-size:17px;

    }

    .photo-slider img{

        width:190px;

        height:260px;

    }

    .big-text{

        font-size:18px;

    }

    .normal-text{

        font-size:16px;

    }

    .letter-box{

        max-height:50vh;

        font-size:15px;

    }

}

/* Tablet */

@media(min-width:601px) and (max-width:1024px){

    .container{

        max-width:600px;

    }

    h1{

        font-size:40px;

    }

}

</style>

</head>

<body>

<script>

let decoration=["🧸","🎀","💗"];

for(let i=0;i<40;i++){

    let item=document.createElement("div");

    item.className="falling";

    item.innerHTML=decoration[Math.floor(Math.random()*decoration.length)];

    item.style.left=Math.random()*100+"vw";

    item.style.fontSize=(20+Math.random()*20)+"px";

    item.style.animationDuration=(5+Math.random()*5)+"s";

    item.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(item);

}

</script>

<div class="container" id="app">

    <div class="gif-box">

        <img src="catcake.gif">

    <h1>HAPPY BIRTHDAYY</h1>

    <h1>(੭ˊᵕˋ)੭🎂</h1>

        tap &lt;3

</div>

function fade(content){

    const app=document.getElementById("app");

    app.style.opacity="0";
    app.style.transform="translateY(20px)";

    setTimeout(()=>{

        app.innerHTML=content;

        app.style.opacity="1";
        app.style.transform="translateY(0)";

    },250);

}

</script>

</body>
</html>
