<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}


body{

    min-height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #ffffff,
        #fff8f2,
        #e8d0b8
    );

}


/* dekorasi jatuh */

.falling{

    position:fixed;
    top:-60px;
    z-index:1;

    animation:fall linear infinite;

    pointer-events:none;

}


@keyframes fall{

    from{
        transform:translateY(-100px) rotate(0deg);
    }

    to{
        transform:translateY(110vh) rotate(360deg);
    }

}



.container{

    width:90%;
    max-width:500px;

    text-align:center;

    position:relative;
    z-index:5;

}



h1{

    color:#805438;

    font-size:42px;

    margin-bottom:20px;

}



.gif-box img{

    width:230px;

    border-radius:20px;

}



.text{

    margin-top:20px;

    color:#8d6045;

    font-size:21px;

    line-height:1.6;

}



button{

    margin-top:30px;

    padding:14px 35px;

    border:none;

    border-radius:30px;

    background:#f4a5b8;

    color:white;

    font-size:20px;

    cursor:pointer;

    transition:.3s;

}


button:hover{

    transform:scale(1.1);

}



/* moment */

.moment h1{

    font-family:cursive;

    font-size:45px;

}


.small{

    color:#a4775b;

    font-style:italic;

}



/* foto */

.photo-slider{

    display:flex;

    gap:15px;

    overflow-x:auto;

    padding:15px;

    scroll-snap-type:x mandatory;

}


.photo-slider img{

    width:260px;

    height:350px;

    object-fit:cover;

    border-radius:20px;

    scroll-snap-align:center;

}



.big-text{

    margin-top:20px;

    font-size:22px;

    font-weight:bold;

    color:#805438;

}



.normal-text{

    margin-top:15px;

    color:#95664b;

    font-size:18px;

}



/* surat */

.letter-box{

    width:90%;

    max-width:450px;

    height:400px;

    overflow-y:auto;

    margin:auto;

    padding:25px;

    background:rgba(255,255,255,.6);

    border-left:3px solid #f0a5b7;

    border-right:3px solid #f0a5b7;

    border-radius:20px;

    text-align:left;

    color:#795548;

    line-height:1.8;

}


</style>

</head>



<body>



<script>


// animasi jatuhan

let decoration=[

"🧸",
"🎀",
"💗"

];


for(let i=0;i<40;i++){


    let item=document.createElement("div");


    item.className="falling";


    item.innerHTML=
    decoration[
        Math.floor(Math.random()*decoration.length)
    ];



    item.style.left=Math.random()*100+"vw";


    item.style.fontSize=
    (20+Math.random()*25)+"px";


    item.style.animationDuration=
    (5+Math.random()*5)+"s";


    item.style.animationDelay=
    Math.random()*5+"s";


    document.body.appendChild(item);


}



</script>
